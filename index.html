<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dad Runner - Father's Day Edition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    color: white;
    overflow: hidden;
  }
  canvas {
    border: 4px solid #ffd700;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(255, 215, 0, 0.25);
    max-width: 100vw;
  }
</style>
</head>
<body>
<canvas id="game" width="800" height="400"></canvas>

<script>
'use strict';

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = 800, H = 400;

// ── roundRect polyfill (Safari < 15.4) ───────────────────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = typeof r === 'number' ? [r,r,r,r] : (r || [0,0,0,0]);
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.arcTo(x+w, y,   x+w, y+r[1],   r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.arcTo(x+w, y+h, x+w-r[2], y+h, r[2]);
    this.lineTo(x + r[3], y + h);
    this.arcTo(x, y+h, x, y+h-r[3], r[3]);
    this.lineTo(x, y + r[0]);
    this.arcTo(x, y, x+r[0], y, r[0]);
    this.closePath();
    return this;
  };
}

// ── Game states ───────────────────────────────────────────────────────────────
const GS = {
  MENU:       'MENU',
  PLAYING:    'PLAYING',
  TRANSITION: 'TRANSITION',
  POOL:       'POOL',
  GYM:        'GYM',
  GAMEOVER:   'GAMEOVER',
  WIN:        'WIN',
};
let gameState = GS.MENU;

// ── Globals ───────────────────────────────────────────────────────────────────
let frame     = 0;
let score     = 0;
let hiScore   = 0;
let gameSpeed = 4;
let scrollBg  = 0;
let gameStats = { waspsStung: 0, hosedCount: 0, obstacleHits: 0 };
let coinsCollected = new Set();
let coinsSpawned   = new Set();
let pendingCoin    = null;

let hunger       = 5;
const MAX_HUNGER = 5;
let hungerTimer  = 0;
let eggTimer     = 400;

const GROUND_Y = 340; // y where dad's feet and obstacle bottoms sit

// ── Dad ───────────────────────────────────────────────────────────────────────
const JUMP_VY  = -13;
const GRAVITY  = 0.55;

const dad = {
  x: 120, y: 0, w: 36, h: 56,
  vy: 0, onGround: true, jumpsLeft: 1,
  runFrame: 0,
  coffeeTimer: 0,   // > 0 → double jump active
  remoteTimer: 0,
  tongsTimer:  0,
  invTimer:    0,
  hosedTimer:  0,
  stungTimer:  0,
  sprayTimer:  0,   // > 0 → bug spray active, wasps die on contact
  get hasCoffee()    { return this.coffeeTimer > 0; },
  get hasRemote()    { return this.remoteTimer > 0; },
  get hasTongs()     { return this.tongsTimer  > 0; },
  get isInvincible() { return this.invTimer    > 0; },
  get isHosed()      { return this.hosedTimer  > 0; },
  get isStung()      { return this.stungTimer  > 0; },
  get isSpray()      { return this.sprayTimer  > 0; },
};
dad.y = GROUND_Y - dad.h; // stand with feet at GROUND_Y

function drawDad() {
  const {x, y, w, h} = dad;
  ctx.save();

  // flash transparent when invincible
  if (dad.isInvincible && Math.floor(dad.invTimer / 4) % 2 === 0) {
    ctx.globalAlpha = 0.3;
  }

  // coffee glow
  if (dad.hasCoffee) { ctx.shadowColor = '#c8660d'; ctx.shadowBlur = 18; }

  const phase   = dad.runFrame * 0.18;
  const legSwing = dad.onGround ? Math.sin(phase) * 10 : 0;
  const armSwing = dad.onGround ? Math.sin(phase) * 8  : 0;

  // ── Shoes ──
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.ellipse(x + 7  + legSwing * 0.4, y + h + 4, 10, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + 29 - legSwing * 0.4, y + h + 4, 10, 5, 0, 0, Math.PI*2); ctx.fill();

  // ── Pants (khaki) ──
  ctx.fillStyle = '#c8a96e';
  ctx.fillRect(x + 3  + legSwing * 0.6, y + h - 20, 13, 22);
  ctx.fillRect(x + 20 - legSwing * 0.6, y + h - 20, 13, 22);

  // ── Sting sweat drops (stung indicator) ──
  if (dad.isStung) {
    ctx.fillStyle = '#f1c40f';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    const bob = Math.sin(frame * 0.2) * 2;
    ctx.fillText('😵', x + w/2, y - 8 - bob);
  }

  // ── Hose wrap on legs ──
  if (dad.isHosed) {
    ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    const ww = (frame * 0.12) % (Math.PI * 2);
    for (let loop = 0; loop < 3; loop++) {
      const ly = y + h - 4 - loop * 7;
      ctx.beginPath();
      ctx.moveTo(x - 2, ly);
      ctx.bezierCurveTo(x + w*0.3, ly - 6 + Math.sin(ww+loop)*4,
                        x + w*0.7, ly + 6 - Math.sin(ww+loop)*4,
                        x + w + 2, ly);
      ctx.stroke();
    }
  }

  // ── Belt ──
  ctx.fillStyle = '#5c3d1e';
  ctx.fillRect(x + 1, y + h - 23, w - 2, 6);

  // ── Body / polo shirt ──
  ctx.fillStyle = '#6ab4f5';
  ctx.beginPath(); ctx.roundRect(x + 1, y + 14, w - 2, h - 32, [4,4,8,8]); ctx.fill();
  // polo placket stripe
  ctx.fillStyle = '#5a9fd4';
  ctx.fillRect(x + w/2 - 3, y + 14, 6, h - 40);

  // ── Left arm ──
  ctx.save();
  ctx.translate(x - 1, y + 20);
  ctx.rotate((-0.3 + armSwing * 0.04) * 0.5);
  ctx.fillStyle = '#f5c28a'; ctx.fillRect(-5, 0, 9, 22);
  ctx.beginPath(); ctx.arc(-1, 22, 5, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Right arm ──
  ctx.save();
  ctx.translate(x + w + 1, y + 20);
  ctx.rotate((0.3 - armSwing * 0.04) * 0.5);
  ctx.fillStyle = '#f5c28a'; ctx.fillRect(-4, 0, 9, 22);
  ctx.beginPath(); ctx.arc(1, 22, 5, 0, Math.PI*2); ctx.fill();
  // BBQ tongs in right hand
  if (dad.hasTongs) {
    ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(2, 24); ctx.lineTo(10, 10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(2, 28); ctx.lineTo(12, 36); ctx.stroke();
  }
  ctx.restore();

  // ── Head ──
  ctx.shadowBlur = 0;
  const stung      = dad.isStung;
  const headR      = stung ? 18 : 15;                      // swollen = bigger
  const skinColor  = stung ? '#d94a2a' : '#f5c28a';        // red when stung
  const cheekColor = stung ? '#c03020' : null;
  ctx.fillStyle = skinColor;
  ctx.beginPath(); ctx.arc(x + w/2, y + 10, headR, 0, Math.PI*2); ctx.fill();

  // Swollen cheek lumps
  if (stung) {
    ctx.fillStyle = '#c03020';
    ctx.beginPath(); ctx.ellipse(x + w/2 - 13, y + 14, 8, 6, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + w/2 + 13, y + 14, 8, 6,  0.3, 0, Math.PI*2); ctx.fill();
    // sting bump on forehead
    ctx.fillStyle = '#ff6040';
    ctx.beginPath(); ctx.arc(x + w/2 + 5, y + 2, 4, 0, Math.PI*2); ctx.fill();
  }

  // ── Receding hair ──
  ctx.fillStyle = '#7a5010';
  ctx.beginPath(); ctx.arc(x + w/2 - 9, y + 4, 6,  Math.PI, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w/2 + 9, y + 4, 6,  Math.PI, Math.PI*2); ctx.fill();

  // ── Baseball cap ──
  ctx.fillStyle = '#1a5276';
  ctx.fillRect(x + w/2 - 14, y - 6, 28, 7);
  ctx.beginPath(); ctx.arc(x + w/2, y - 2, 14, Math.PI, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + w/2 + 8, y - 1, 18, 5, -0.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#d4a030';
  ctx.beginPath(); ctx.arc(x + w/2, y - 16, 3, 0, Math.PI*2); ctx.fill();

  // ── Eyes — squinting X's when stung, normal otherwise ──
  if (stung) {
    ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    for (const ex of [x + w/2 - 5, x + w/2 + 5]) {
      ctx.beginPath(); ctx.moveTo(ex-3, y+7); ctx.lineTo(ex+3, y+13); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex+3, y+7); ctx.lineTo(ex-3, y+13); ctx.stroke();
    }
  } else {
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(x + w/2 - 5, y + 9, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w/2 + 5, y + 9, 2.5, 0, Math.PI*2); ctx.fill();
  }

  // ── Glasses ──
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(x + w/2 - 12, y + 5, 10, 9, 2); ctx.stroke();
  ctx.beginPath(); ctx.roundRect(x + w/2 + 2,  y + 5, 10, 9, 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + w/2 - 2, y + 9); ctx.lineTo(x + w/2 + 2, y + 9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + w/2 - 12, y + 8); ctx.lineTo(x + w/2 - 15, y + 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + w/2 + 12, y + 8); ctx.lineTo(x + w/2 + 15, y + 8); ctx.stroke();

  // ── Mouth — wavy grimace when stung, smile otherwise ──
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.8;
  if (stung) {
    ctx.beginPath();
    ctx.moveTo(x + w/2 - 6, y + 17);
    ctx.bezierCurveTo(x + w/2 - 2, y + 14, x + w/2 + 2, y + 20, x + w/2 + 6, y + 17);
    ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(x + w/2, y + 13, 5, 0, Math.PI); ctx.stroke();
  }

  // ── Mustache ──
  ctx.fillStyle = stung ? '#8b3010' : '#5c3d1e';
  ctx.beginPath(); ctx.ellipse(x + w/2, y + 16, 7, 3, 0, Math.PI, Math.PI*2); ctx.fill();

  // ── Coffee steam ──
  if (dad.hasCoffee) {
    ctx.strokeStyle = 'rgba(200,130,40,0.55)'; ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const p = (frame * 0.06 + i * 1.1) % (Math.PI * 2);
      const sx = x + w/2 - 7 + i * 7;
      ctx.beginPath();
      ctx.moveTo(sx, y - 22);
      ctx.bezierCurveTo(sx + Math.sin(p)*4, y-30, sx - Math.sin(p)*4, y-38, sx, y-46);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function updateDad() {
  dad.vy += GRAVITY;
  dad.y  += dad.vy;
  if (dad.y + dad.h >= GROUND_Y) {
    dad.y = GROUND_Y - dad.h;
    dad.vy = 0;
    dad.onGround = true;
    dad.jumpsLeft = dad.hasCoffee ? 2 : 1;
  }
  if (dad.onGround) dad.runFrame++;
  if (dad.coffeeTimer > 0) dad.coffeeTimer--;
  if (dad.remoteTimer > 0) dad.remoteTimer--;
  if (dad.tongsTimer  > 0) dad.tongsTimer--;
  if (dad.invTimer    > 0) dad.invTimer--;
  if (dad.hosedTimer  > 0) dad.hosedTimer--;
  if (dad.stungTimer  > 0) dad.stungTimer--;
  if (dad.sprayTimer  > 0) dad.sprayTimer--;
}

function hungerJumpMod() {
  return hunger <= 0 ? 0.68 : 1;
}

function doJump() {
  if (dad.jumpsLeft > 0) {
    let power = dad.hasCoffee ? 1.2 : 1;
    if (dad.isStung) power *= 0.5;
    power *= hungerJumpMod();
    dad.vy       = JUMP_VY * power;
    dad.onGround = false;
    dad.jumpsLeft--;
  }
}

// ── Clouds ────────────────────────────────────────────────────────────────────
const clouds = Array.from({length: 6}, () => ({
  x: Math.random() * W,
  y: 20 + Math.random() * 70,
  w: 60 + Math.random() * 80,
  spd: 0.25 + Math.random() * 0.35,
}));

// ── Background ────────────────────────────────────────────────────────────────
function drawCloud(x, y, w) {
  ctx.beginPath();
  ctx.arc(x,           y,       w * 0.30, 0, Math.PI * 2);
  ctx.arc(x + w * 0.3, y - w * 0.10, w * 0.22, 0, Math.PI * 2);
  ctx.arc(x + w * 0.6, y,       w * 0.25, 0, Math.PI * 2);
  ctx.arc(x + w * 0.3, y + w * 0.08, w * 0.28, 0, Math.PI * 2);
  ctx.fill();
}

function drawHouse(x, y) {
  // body
  ctx.fillStyle = '#d0c8b8';
  ctx.fillRect(x + 20, y + 30, 100, 60);
  // roof
  ctx.fillStyle = '#b08060';
  ctx.beginPath();
  ctx.moveTo(x + 10, y + 30);
  ctx.lineTo(x + 70,  y - 20);
  ctx.lineTo(x + 130, y + 30);
  ctx.fill();
  // door
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(x + 58, y + 55, 24, 35);
  // windows
  ctx.fillStyle = '#aee8f5';
  ctx.fillRect(x + 25, y + 40, 22, 20);
  ctx.fillRect(x + 93, y + 40, 22, 20);
  // chimney
  ctx.fillStyle = '#c0a090';
  ctx.fillRect(x + 84, y - 20, 18, 32);
}

function drawBackground() {
  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  sky.addColorStop(0, '#5ba8d8');
  sky.addColorStop(1, '#c7e8f7');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Clouds (slowest layer)
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  for (const c of clouds) drawCloud(c.x, c.y, c.w);

  // Houses (0.2× scroll)
  const hOff = (scrollBg * 0.2) % 320;
  for (let hx = -hOff; hx < W + 160; hx += 320)
    drawHouse(hx, GROUND_Y - 100);

  // Picket fence (0.5× scroll)
  const fOff = (scrollBg * 0.5) % 60;
  ctx.fillStyle = '#f0ede0';
  for (let fx = -fOff; fx < W + 60; fx += 60) {
    // rails
    ctx.fillRect(fx, GROUND_Y - 38, 60, 7);
    ctx.fillRect(fx, GROUND_Y - 22, 60, 7);
    // posts + pointed tops
    for (const px of [fx, fx + 30]) {
      ctx.fillRect(px, GROUND_Y - 42, 8, 42);
      ctx.beginPath();
      ctx.moveTo(px, GROUND_Y - 42);
      ctx.lineTo(px + 4, GROUND_Y - 54);
      ctx.lineTo(px + 8, GROUND_Y - 42);
      ctx.fill();
    }
  }

  // Grass + dirt
  const ground = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  ground.addColorStop(0,    '#5d8a3c');
  ground.addColorStop(0.08, '#4a7a2c');
  ground.addColorStop(0.12, '#8b6914');
  ground.addColorStop(1,    '#6e5012');
  ctx.fillStyle = ground;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Ground dashes (1× scroll)
  const dOff = scrollBg % 60;
  ctx.strokeStyle = '#3d6b22';
  ctx.lineWidth = 2;
  for (let dx = -dOff; dx < W; dx += 60) {
    ctx.beginPath();
    ctx.moveTo(dx, GROUND_Y + 9);
    ctx.lineTo(dx + 30, GROUND_Y + 9);
    ctx.stroke();
  }
}

// ── Obstacles ────────────────────────────────────────────────────────────────
let obstacles   = [];
let obsTimer    = 80; // frames until next spawn

function shadeHex(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  const clamp = v => Math.min(255, Math.max(0, v));
  const r = clamp((n >> 16) + amt);
  const g = clamp(((n >> 8) & 0xff) + amt);
  const b = clamp((n & 0xff) + amt);
  return '#' + ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

function drawLego(o) {
  const cols = ['#e74c3c','#3498db','#f1c40f','#2ecc71','#e67e22'];
  const col  = cols[o.colorIdx];
  ctx.fillStyle = col;
  ctx.fillRect(o.x, o.y, o.w, o.h);
  ctx.strokeStyle = shadeHex(col, 40); ctx.lineWidth = 1;
  ctx.strokeRect(o.x+1, o.y+1, o.w-2, o.h-2);
  // always exactly 3 studs
  ctx.fillStyle = shadeHex(col, -25);
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(o.x + o.w/2 + (i - 1) * 12, o.y - 4, 4, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawLaundry(o) {
  const {x, y, w, h} = o;
  // Basket body (wicker)
  ctx.fillStyle = '#c8a96e';
  ctx.beginPath(); ctx.roundRect(x + 4, y + h - 32, w - 8, 32, [3,3,8,8]); ctx.fill();
  // Weave lines
  ctx.strokeStyle = '#a8894e'; ctx.lineWidth = 1.2;
  for (let wy = y+h-26; wy < y+h-2; wy += 7) {
    ctx.beginPath(); ctx.moveTo(x+6, wy); ctx.lineTo(x+w-6, wy); ctx.stroke();
  }
  for (let wx = x+12; wx < x+w-6; wx += 9) {
    ctx.beginPath(); ctx.moveTo(wx, y+h-32); ctx.lineTo(wx, y+h-2); ctx.stroke();
  }
  // Rim
  ctx.fillStyle = '#d4b07a'; ctx.fillRect(x+2, y+h-34, w-4, 5);
  // Colorful clothes sticking out top (shirts)
  const clothCols = ['#e74c3c','#3498db','#f1c40f','#9b59b6'];
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = clothCols[i];
    ctx.save();
    ctx.translate(x + 9 + i * 11, y + h - 34);
    ctx.rotate((i - 1.5) * 0.25);
    ctx.beginPath(); ctx.roundRect(-5, -16, 11, 18, 3); ctx.fill();
    // shirt collar V
    ctx.strokeStyle = shadeHex(clothCols[i], -30); ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-3,-14); ctx.lineTo(0,-8); ctx.lineTo(3,-14); ctx.stroke();
    ctx.restore();
  }

  // Tighty whities hanging over the sides
  function drawUndies(ux, uy, angle) {
    ctx.save();
    ctx.translate(ux, uy);
    ctx.rotate(angle);

    // Waistband
    ctx.fillStyle = '#a0a0a0';
    ctx.beginPath(); ctx.roundRect(-26, -28, 52, 8, 2); ctx.fill();
    // Waistband inner stripe
    ctx.fillStyle = '#b8b8b8';
    ctx.fillRect(-26, -23, 52, 3);

    // Brief body — wide rectangle that scoops into leg openings at bottom
    ctx.fillStyle = '#f2f2f2';
    ctx.beginPath();
    ctx.moveTo(-26, -20);           // top-left under waistband
    ctx.lineTo( 26, -20);           // top-right
    ctx.lineTo( 26,   4);           // straight down right side
    ctx.arc( 13, 4, 13, 0, Math.PI); // right leg-opening arch (left half)
    // now at (0, 4) — center crotch
    ctx.arc(-13, 4, 13, 0, Math.PI); // left leg-opening arch
    // now at (-26, 4)
    ctx.lineTo(-26, -20);
    ctx.closePath();
    ctx.fill();

    // Signature seam lines — double-stitched curves following each leg arch
    ctx.lineWidth = 1;
    // Right leg arch seam (outer)
    ctx.strokeStyle = '#d0d0d0';
    ctx.beginPath(); ctx.arc( 13, 4, 15, 0, Math.PI); ctx.stroke();
    // Right leg arch seam (inner, tighter)
    ctx.beginPath(); ctx.arc( 13, 4, 11, 0, Math.PI); ctx.stroke();
    // Left leg arch seam (outer)
    ctx.beginPath(); ctx.arc(-13, 4, 15, 0, Math.PI); ctx.stroke();
    // Left leg arch seam (inner)
    ctx.beginPath(); ctx.arc(-13, 4, 11, 0, Math.PI); ctx.stroke();

    // Center fly seam
    ctx.strokeStyle = '#c8c8c8';
    ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(0, -5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-3, -5); ctx.lineTo(3, -5); ctx.stroke();

    ctx.restore();
  }

  drawUndies(x + w/2 - 2, y + h - 40, 0.2);
}

function drawHose(o) {
  const cx = o.x + o.w/2;
  const base = o.y + o.h;
  const coilCy = base - 18; // vertical center of the coil

  // Spiral coil — parametric path, 2 full turns, flattened for ground perspective
  ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  let first = true;
  for (let t = 0; t <= Math.PI * 4; t += 0.07) {
    const r  = 4 + t * 2.1;
    const px = cx + Math.cos(t - Math.PI / 2) * r;
    const py = coilCy + Math.sin(t - Math.PI / 2) * r * 0.5; // flatten vertically
    if (first) { ctx.moveTo(px, py); first = false; }
    else ctx.lineTo(px, py);
  }
  ctx.stroke();

  // Neck rising from coil centre up to the nozzle head
  ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 8; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, coilCy - 4);
  ctx.bezierCurveTo(cx + 6, coilCy - 16, cx - 6, coilCy - 26, cx, coilCy - 32);
  ctx.stroke();

  // Cobra hood (dark green flattened ellipse behind head)
  ctx.fillStyle = '#145a32';
  ctx.beginPath(); ctx.ellipse(cx, coilCy - 38, 12, 7, 0, 0, Math.PI * 2); ctx.fill();
  // Hood marking
  ctx.strokeStyle = '#1e8449'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(cx, coilCy - 38, 8, 4, 0, 0, Math.PI * 2); ctx.stroke();

  // Brass nozzle head (the "face")
  ctx.fillStyle = '#c8960c';
  ctx.beginPath(); ctx.roundRect(cx - 6, coilCy - 50, 12, 16, 4); ctx.fill();
  ctx.fillStyle = '#a07010'; // darker tip / snout
  ctx.beginPath(); ctx.roundRect(cx - 4, coilCy - 54, 8, 7, 3); ctx.fill();

  // Eyes on the nozzle
  ctx.fillStyle = '#f0c030';
  ctx.beginPath(); ctx.arc(cx - 3, coilCy - 44, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 3, coilCy - 44, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(cx - 3, coilCy - 44, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 3, coilCy - 44, 1.2, 0, Math.PI * 2); ctx.fill();

  // Flickering forked tongue
  if (Math.sin(frame * 0.14) > 0) {
    ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx, coilCy - 54); ctx.lineTo(cx, coilCy - 60); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, coilCy - 60); ctx.lineTo(cx - 4, coilCy - 65); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, coilCy - 60); ctx.lineTo(cx + 4, coilCy - 65); ctx.stroke();
  }
}

function drawSprinkler(o) {
  const cx = o.x + o.w/2, base = o.y + o.h;
  // Ground spike
  ctx.fillStyle = '#5d6d7e';
  ctx.beginPath(); ctx.roundRect(cx-4, base-28, 8, 28, 2); ctx.fill();
  // Head hub
  ctx.fillStyle = '#808b96';
  ctx.beginPath(); ctx.arc(cx, base-28, 10, 0, Math.PI*2); ctx.fill();
  // Rotating T-bar arm
  const rot = frame * 0.05;
  ctx.strokeStyle = '#aab7b8'; ctx.lineWidth = 6; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - Math.cos(rot)*14, base-28 - Math.sin(rot)*14);
  ctx.lineTo(cx + Math.cos(rot)*14, base-28 + Math.sin(rot)*14);
  ctx.stroke();
  // Water droplets flung outward
  ctx.fillStyle = 'rgba(52,152,219,0.75)';
  for (let d = 0; d < 6; d++) {
    const a = rot + d * (Math.PI/3);
    const t = ((frame * 0.06 + d * 0.28) % 1);
    const r = 12 + t * 38;
    const dy = t * t * 20; // arc down
    ctx.beginPath();
    ctx.arc(cx + Math.cos(a)*r, base-28 + Math.sin(a)*r + dy, 3*(1-t)+1, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawFlyTrap(o) {
  const cx   = o.x + o.w / 2;
  const base = o.y + o.h;
  const r    = 18;
  const cy   = o.y + r + 2;   // head centre

  // Stem
  ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 9; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx, base); ctx.lineTo(cx, cy + r - 2); ctx.stroke();

  // Leaves
  ctx.fillStyle = '#27ae60';
  ctx.beginPath(); ctx.ellipse(cx - 14, base - 20, 14, 6, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 14, base - 36, 14, 6,  0.4, 0, Math.PI*2); ctx.fill();

  // Pac-Man mouth, opening to the left (toward approaching dad)
  const bite  = Math.abs(Math.sin(frame * 0.07 + o.phase));
  const angle = 0.08 + bite * 0.44;   // ~5° closed → ~30° open

  // Green body
  ctx.fillStyle = '#27ae60';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, Math.PI + angle, Math.PI - angle);
  ctx.closePath();
  ctx.fill();

  // Red mouth interior
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r - 4, Math.PI + angle, Math.PI - angle);
  ctx.closePath();
  ctx.fill();

  // Single dot eye (upper-right of head)
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(cx + 5, cy - r * 0.42, 3.5, 0, Math.PI*2); ctx.fill();
}

function drawWasp(o) {
  const bob = Math.sin(frame * 0.13 + o.phase) * 5;
  const cx  = o.x + o.w / 2;
  const cy  = o.y + o.h / 2 + bob;
  ctx.save();
  ctx.translate(cx, cy);

  // Wings — translucent, flapping
  const flap = Math.sin(frame * 0.35) * 0.35;
  ctx.fillStyle = 'rgba(210,235,255,0.75)';
  for (const side of [-1, 1]) {
    ctx.save();
    ctx.rotate(side * (0.3 - flap));
    ctx.beginPath(); ctx.ellipse(side * 5, -9, 11, 5, side * 0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(side * 4, -4,  7, 3, side * 0.2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Abdomen (red with black stripes)
  ctx.save();
  ctx.beginPath(); ctx.ellipse(5, 1, 13, 6, 0.15, 0, Math.PI*2); ctx.clip();
  ctx.fillStyle = '#d63031'; ctx.fillRect(-8, -6, 26, 14);
  ctx.fillStyle = 'rgba(10,10,10,0.65)';
  for (let s = 0; s < 4; s++) ctx.fillRect(-4 + s * 6, -6, 3, 14);
  ctx.restore();

  // Thorax
  ctx.fillStyle = '#c0392b';
  ctx.beginPath(); ctx.arc(-1, 0, 6, 0, Math.PI*2); ctx.fill();

  // Head
  ctx.fillStyle = '#b03020';
  ctx.beginPath(); ctx.arc(-9, 0, 5, 0, Math.PI*2); ctx.fill();

  // Eye
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-11, -1, 1.8, 0, Math.PI*2); ctx.fill();

  // Antennae
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-12, -3); ctx.lineTo(-17, -9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-11, -4); ctx.lineTo(-14,-11); ctx.stroke();

  // Stinger
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.moveTo(17,0); ctx.lineTo(23,1); ctx.lineTo(17,4); ctx.fill();

  ctx.restore();
}

function drawObstacle(o) {
  ctx.save();
  switch(o.type) {
    case 'lego':     drawLego(o);     break;
    case 'laundry':  drawLaundry(o);  break;
    case 'hose':     drawHose(o);     break;
    case 'sprinkler':drawSprinkler(o);break;
    case 'flytrap':  drawFlyTrap(o);  break;
    case 'wasp':     drawWasp(o);     break;
  }
  ctx.restore();
}

function spawnObstacle() {
  const spd = gameSpeed * (dad.hasRemote ? 0.4 : 1);
  const pool = ['lego','laundry','hose'];
  if (score > 250)              pool.push('sprinkler');
  if (score >= YMCA_SCORE / 2) pool.push('wasp');
  if (score > 500)              pool.push('flytrap');
  const type = pool[Math.floor(Math.random() * pool.length)];

  const o = { type, x: W + 20, speed: spd, colorIdx: Math.floor(Math.random()*5), phase: Math.random() * Math.PI * 2 };
  switch(type) {
    case 'lego':
      o.w = 48; o.h = 20; o.y = GROUND_Y - o.h; break;
    case 'laundry':
      o.w = 52; o.h = 50; o.y = GROUND_Y - o.h; break;
    case 'hose':
      o.w = 60; o.h = 65; o.y = GROUND_Y - o.h; break;
    case 'sprinkler':
      o.w = 52; o.h = 44; o.y = GROUND_Y - o.h; break;
    case 'flytrap':
      o.w = 42; o.h = 62; o.y = GROUND_Y - o.h; break;
    case 'wasp':
      o.w = 46; o.h = 28;
      o.y = GROUND_Y - 80 - Math.random() * 50; break; // flies at head/chest height
  }
  obstacles.push(o);
}

function hungerSpeedMod() {
  return hunger <= 0 ? 0.75 : 1;
}

function effectiveSpeed() {
  let spd = gameSpeed;
  if (dad.hasRemote) spd *= 0.4;
  if (dad.isHosed)   spd *= 0.45;
  spd *= hungerSpeedMod();
  return spd;
}

function updateObstacles() {
  const spd = effectiveSpeed();

  obsTimer--;
  if (obsTimer <= 0) {
    spawnObstacle();
    const minGap = Math.max(28, 65 - score/60);
    obsTimer = minGap + Math.random() * 55;
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= spd;
    if (obstacles[i].x + obstacles[i].w < 0) obstacles.splice(i, 1);
  }
}

// ── Collision ─────────────────────────────────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh, margin = 7) {
  return ax+margin < bx+bw-margin && ax+aw-margin > bx+margin &&
         ay+margin < by+bh-margin && ay+ah-margin > by+margin;
}

function checkObstacleCollisions() {
  const {x, y, w, h} = dad;
  for (let i = obstacles.length-1; i >= 0; i--) {
    const o = obstacles[i];
    if (!rectsOverlap(x, y, w, h, o.x, o.y, o.w, o.h)) continue;

    if (o.type === 'hose') {
      if (!dad.isHosed) gameStats.hosedCount++;
      dad.hosedTimer = 240;
      obstacles.splice(i, 1);
      continue;
    }

    if (o.type === 'wasp') {
      obstacles.splice(i, 1);
      if (dad.isInvincible || dad.isSpray) continue;
      gameStats.waspsStung++;
      dad.stungTimer = 300;
      dad.invTimer   = 90;
      continue;
    }

    if (dad.isInvincible) continue;
    gameStats.obstacleHits++;
    dad.invTimer = 120;
    obstacles.splice(i, 1);
    break;
  }
}

// ── Floating score text ───────────────────────────────────────────────────────
let floatTexts = [];
function addFloat(text, x, y, color) {
  floatTexts.push({ text, x, y, life: 55, color: color || '#ffd700' });
}
function updateFloatTexts() {
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    floatTexts[i].y  -= 0.9;
    floatTexts[i].life--;
    if (floatTexts[i].life <= 0) floatTexts.splice(i, 1);
  }
}
function drawFloatTexts() {
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 15px Arial';
  for (const ft of floatTexts) {
    ctx.globalAlpha = ft.life / 55;
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── Powerups & collectibles ───────────────────────────────────────────────────
let powerups  = [];
let puTimer   = 260;

const YMCA_SCORE    = 700;
let   ymcaTriggered = false;

const COIN_TYPES    = ['pound', 'euro', 'yen'];
const COIN_SCHEDULE = [
  { type:'pound', at: 140 },
  { type:'euro',  at: 380 },
  { type:'yen',   at: 580 },
];

function rightEdgeClear(margin) {
  return !obstacles.some(o => o.x > W - margin) &&
         !powerups.some(p => p.x > W - margin);
}

function drawCoin(px, py, type, r) {
  r = r || 18;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  if (type === 'pound') {
    // Milled gold coin
    ctx.fillStyle = '#9a6a08';
    ctx.beginPath(); ctx.arc(px, py, r + 2, 0, Math.PI*2); ctx.fill();
    // Serrated edge
    const teeth = 22;
    ctx.fillStyle = '#c89010';
    for (let i = 0; i < teeth; i++) {
      const a = (i / teeth) * Math.PI * 2;
      ctx.beginPath(); ctx.arc(px + Math.cos(a)*(r+1), py + Math.sin(a)*(r+1), 2.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#e8b828';
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#d4a020';
    ctx.beginPath(); ctx.arc(px, py, r * 0.82, 0, Math.PI*2); ctx.fill();
    // Crown at top
    ctx.fillStyle = '#9a6008';
    ctx.beginPath();
    ctx.moveTo(px - 7, py - 4); ctx.lineTo(px - 9, py - 10);
    ctx.lineTo(px - 5, py - 7); ctx.lineTo(px,     py - 11);
    ctx.lineTo(px + 5, py - 7); ctx.lineTo(px + 9, py - 10);
    ctx.lineTo(px + 7, py - 4); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#6a4006';
    ctx.font = `bold ${Math.round(r * 0.78)}px serif`;
    ctx.fillText('£', px + 1, py + 5);

  } else if (type === 'euro') {
    // Bi-metallic: gold outer ring, silver-grey inner disc
    ctx.fillStyle = '#c89010';
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#b0b0b8';
    ctx.beginPath(); ctx.arc(px, py, r * 0.60, 0, Math.PI*2); ctx.fill();
    // 12 EU stars on the gold ring
    ctx.fillStyle = '#ffe040';
    const ns = 12;
    for (let i = 0; i < ns; i++) {
      const a = (i / ns) * Math.PI * 2 - Math.PI / 2;
      const sx = px + Math.cos(a) * r * 0.79;
      const sy = py + Math.sin(a) * r * 0.79;
      ctx.beginPath(); ctx.arc(sx, sy, 1.6, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#3a3a3a';
    ctx.font = `bold ${Math.round(r * 0.72)}px Arial`;
    ctx.fillText('€', px, py + 1);

  } else if (type === 'yen') {
    // Bi-metallic: silver outer, gold inner (500-yen style)
    ctx.fillStyle = '#888898';
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
    // Fine edge ring
    ctx.strokeStyle = '#aaaabc'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(px, py, r - 1, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#c8a820';
    ctx.beginPath(); ctx.arc(px, py, r * 0.60, 0, Math.PI*2); ctx.fill();
    // Centre hole (500-yen has no hole, but it has a security feature — use concentric ring)
    ctx.strokeStyle = '#a88a10'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(px, py, r * 0.35, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#5a4808';
    ctx.font = `bold ${Math.round(r * 0.68)}px Arial`;
    ctx.fillText('¥', px, py + 1);
  }

  // Shared shine highlight
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.beginPath(); ctx.arc(px - r*0.28, py - r*0.28, r*0.22, 0, Math.PI*2); ctx.fill();
}

// Coin tracker (Mario-World style) shown during gameplay
function drawCoinTracker() {
  const r = 13, gap = 10, total = COIN_TYPES.length;
  const startX = W - 18 - total * (r*2 + gap) + gap;
  const cy = H - 22;

  ctx.save();
  // Subtle background pill
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.roundRect(startX - r - 8, cy - 16, total * (r*2 + gap) + 6, 36, 8);
  ctx.fill();

  COIN_TYPES.forEach((type, i) => {
    const cx = startX + i * (r*2 + gap) + r;
    if (coinsCollected.has(type)) {
      ctx.shadowBlur = 10; ctx.shadowColor = '#ffd700';
      drawCoin(cx, cy, type, r);
      ctx.shadowBlur = 0;
    } else {
      // Dotted outline placeholder
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 5]);
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.font = 'bold 11px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(type === 'pound' ? '£' : type === 'euro' ? '€' : '¥', cx, cy + 1);
    }
  });
  ctx.restore();
}

function drawBoiledEgg(px, py) {
  ctx.fillStyle = '#f0f0e8';
  ctx.beginPath(); ctx.ellipse(px, py + 2, 10, 13, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#d8d8cf'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(px, py + 2, 10, 13, 0, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = '#f5a820';
  ctx.beginPath(); ctx.arc(px, py - 1, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,200,0.55)';
  ctx.beginPath(); ctx.arc(px - 2, py - 3, 2.5, 0, Math.PI*2); ctx.fill();
}

function drawCoffeeCup(px, py) {
  ctx.fillStyle = '#4a2010';
  ctx.beginPath(); ctx.roundRect(px-10, py-10, 20, 18, 3); ctx.fill();
  ctx.fillStyle = '#8b4513'; ctx.fillRect(px-8, py-8, 16, 9);
  ctx.strokeStyle = '#4a2010'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(px+12, py-2, 5, -Math.PI/2, Math.PI/2); ctx.stroke();
  ctx.strokeStyle = 'rgba(220,220,220,0.65)'; ctx.lineWidth = 1.5;
  for (let s = -1; s <= 1; s++) {
    const p = (frame * 0.08 + s * 1.2) % (Math.PI*2);
    ctx.beginPath();
    ctx.moveTo(px + s*5, py - 12);
    ctx.bezierCurveTo(px+s*5+Math.sin(p)*3, py-19, px+s*5-Math.sin(p)*3, py-26, px+s*5, py-32);
    ctx.stroke();
  }
}

function drawBugSprayCan(px, py) {
  ctx.fillStyle = '#27ae60';
  ctx.beginPath(); ctx.roundRect(px-8, py-15, 16, 24, 4); ctx.fill();
  ctx.fillStyle = 'white'; ctx.fillRect(px-6, py-11, 12, 11);
  ctx.fillStyle = '#e74c3c'; ctx.font = 'bold 5px Arial'; ctx.textAlign = 'center';
  ctx.fillText('BUG', px, py - 5);
  ctx.fillText('OFF!', px, py + 1);
  ctx.fillStyle = '#c0392b';
  ctx.beginPath(); ctx.roundRect(px-5, py-19, 10, 6, 2); ctx.fill();
  ctx.fillRect(px+4, py-17, 8, 3);
}

function drawPowerup(pu) {
  ctx.save();
  const bob = Math.sin(frame * 0.08 + pu.phase) * 4;
  const cx = pu.x + pu.w/2, cy = pu.y + pu.h/2 + bob;
  ctx.shadowBlur = 14;
  if (COIN_TYPES.includes(pu.type)) {
    ctx.shadowColor = '#ffd700';
    drawCoin(cx, cy, pu.type, 18);
  } else if (pu.type === 'egg') {
    ctx.shadowColor = '#f5a820';
    drawBoiledEgg(cx, cy);
  } else if (pu.type === 'coffee') {
    ctx.shadowColor = '#c8660d';
    drawCoffeeCup(cx, cy);
  } else if (pu.type === 'bugspray') {
    ctx.shadowColor = '#27ae60';
    drawBugSprayCan(cx, cy);
  }
  ctx.restore();
}

function spawnPickup(type, yOpts) {
  const ys = yOpts || [GROUND_Y - 45, GROUND_Y - 80, GROUND_Y - 118];
  const y  = ys[Math.floor(Math.random() * ys.length)];
  powerups.push({ type, x: W + 20, y, w: 28, h: 28, phase: Math.random() * Math.PI * 2 });
}

function updatePowerups() {
  const spd = effectiveSpeed();

  // Coffee / bugspray on their own timer
  puTimer--;
  if (puTimer <= 0) {
    if (rightEdgeClear(200)) {
      const type = Math.random() < 0.5 ? 'coffee' : 'bugspray';
      spawnPickup(type, [GROUND_Y - 90]);
    }
    puTimer = 290 + Math.random() * 180;
  }

  // Scheduled coins (one per type) — spawn when right edge is clear
  for (const cs of COIN_SCHEDULE) {
    if (score >= cs.at && !coinsSpawned.has(cs.type)) {
      if (rightEdgeClear(220)) {
        coinsSpawned.add(cs.type);
        spawnPickup(cs.type, [GROUND_Y - 50, GROUND_Y - 85, GROUND_Y - 120]);
      }
      break; // only queue one at a time
    }
  }

  // Boiled egg on its own timer — more frequent when hungry
  eggTimer--;
  const eggRate = hunger === 0 ? 200 : 400;
  if (eggTimer <= 0) {
    if (rightEdgeClear(220)) spawnPickup('egg', [GROUND_Y - 50, GROUND_Y - 85]);
    eggTimer = eggRate + Math.random() * 160;
  }

  for (let i = powerups.length - 1; i >= 0; i--) {
    powerups[i].x -= spd;
    if (powerups[i].x + powerups[i].w < 0) powerups.splice(i, 1);
  }
}

function checkPowerupCollisions() {
  const {x, y, w, h} = dad;
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    if (!rectsOverlap(x, y, w, h, pu.x, pu.y, pu.w, pu.h, 4)) continue;
    const fx = pu.x + pu.w/2, fy = pu.y;
    if (pu.type === 'coffee') {
      dad.coffeeTimer = 600;
      dad.jumpsLeft   = Math.max(dad.jumpsLeft, 2);
      addFloat('☕ COFFEE!', fx, fy, '#f39c12');
    } else if (pu.type === 'bugspray') {
      dad.sprayTimer = 480;
      for (let j = obstacles.length-1; j >= 0; j--)
        if (obstacles[j].type === 'wasp') obstacles.splice(j, 1);
      addFloat('🐝 SPRAYED!', fx, fy, '#27ae60');
    } else if (pu.type === 'egg') {
      const gained = Math.min(1, MAX_HUNGER - hunger);
      hunger = Math.min(MAX_HUNGER, hunger + 1);
      addFloat(hunger >= MAX_HUNGER ? '🍳 full!' : '🍳 nom!', fx, fy, '#f5a820');
    } else if (COIN_TYPES.includes(pu.type)) {
      coinsCollected.add(pu.type);
      score += 50;
      const sym = pu.type === 'pound' ? '£' : pu.type === 'euro' ? '€' : '¥';
      addFloat(`${sym} +50`, fx, fy, '#ffd700');
    }
    powerups.splice(i, 1);
  }
}

// ── Hunger ────────────────────────────────────────────────────────────────────
function updateHunger() {
  hungerTimer++;
  if (hungerTimer >= 390) {
    hungerTimer = 0;
    if (hunger > 0) hunger--;
  }
  // Stomach growl when starving
  if (hunger === 0 && frame % 150 === 0) {
    addFloat('*GROWL*', dad.x + dad.w / 2, dad.y - 10, '#e67e22');
  }
}

function drawDrumstick(cx, cy, filled) {
  // Bone handle
  ctx.fillStyle = filled ? '#ede0c0' : '#3a3a3a';
  ctx.fillRect(cx - 2, cy + 4, 4, 9);
  // Round bone-end knob
  ctx.beginPath(); ctx.arc(cx, cy + 13, 3, 0, Math.PI * 2); ctx.fill();
  // Meat
  ctx.fillStyle = filled ? '#c06810' : '#2e2e2e';
  ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI * 2); ctx.fill();
  if (filled) {
    // Browned highlight
    ctx.fillStyle = '#e08020';
    ctx.beginPath(); ctx.arc(cx - 2, cy - 2, 4.5, 0, Math.PI * 2); ctx.fill();
    // Bone nub peeking out top-right
    ctx.fillStyle = '#ede0c0';
    ctx.beginPath(); ctx.arc(cx + 5, cy - 5, 2.5, 0, Math.PI * 2); ctx.fill();
  }
}

function drawHungerBar() {
  const cx0 = 14, cy = H - 22, gap = 28;
  ctx.save();
  // Subtle background pill
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.roundRect(cx0 - 8, cy - 16, MAX_HUNGER * gap + 2, 36, 8);
  ctx.fill();
  for (let i = 0; i < MAX_HUNGER; i++) {
    drawDrumstick(cx0 + i * gap, cy, i < hunger);
  }
  if (hunger === 0 && Math.floor(frame / 14) % 2 === 0) {
    ctx.fillStyle = 'rgba(255,60,0,0.14)';
    ctx.fillRect(0, H - 46, MAX_HUNGER * gap + cx0 + 10, 46);
  }
  ctx.restore();
}

// ── Score & progress ──────────────────────────────────────────────────────────
function updateScore() {
  if (frame % 5 === 0) score++;
  gameSpeed = 4 + score / 400;
  if (score >= YMCA_SCORE && !ymcaTriggered) {
    ymcaTriggered = true;
    hiScore       = Math.max(hiScore, score);
    gameState     = GS.TRANSITION;
  }
}

// ── Progress bar ──────────────────────────────────────────────────────────────
function drawHouseIcon(cx, cy) {
  ctx.fillStyle = '#d0c8b8'; ctx.fillRect(cx - 14, cy - 2, 28, 14);
  ctx.fillStyle = '#b08060';
  ctx.beginPath(); ctx.moveTo(cx-16, cy-2); ctx.lineTo(cx, cy-16); ctx.lineTo(cx+16, cy-2); ctx.fill();
  ctx.fillStyle = '#8b6914'; ctx.fillRect(cx-4, cy+4, 9, 8);
}

function drawYMCAIcon(cx, cy) {
  ctx.fillStyle = '#1a2f8a'; ctx.fillRect(cx-24, cy-17, 48, 32);
  ctx.fillStyle = '#aee8f5';
  for (let r = 0; r < 2; r++)
    for (let c = 0; c < 3; c++)
      ctx.fillRect(cx - 17 + c*13, cy - 12 + r*11, 9, 8);
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('YMCA', cx, cy + 20);
}

function drawProgressBar() {
  const progress = Math.min(1, score / YMCA_SCORE);
  const BY = 4, BH = 36, BL = 74, BR = 92, BW = W - BL - BR;

  // Strip background
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, W, BY + BH + 4);
  // Thin golden top border
  ctx.fillStyle = 'rgba(255,215,0,0.25)';
  ctx.fillRect(0, BY + BH + 3, W, 1);

  // Track groove
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.roundRect(BL, BY + 10, BW, BH - 20, 4); ctx.fill();
  // Track inner shadow
  ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(BL, BY + 10, BW, BH - 20, 4); ctx.stroke();

  // Fill gradient
  if (progress > 0) {
    const g = ctx.createLinearGradient(BL, 0, BL + BW, 0);
    g.addColorStop(0, '#27ae60'); g.addColorStop(0.6, '#2ecc71'); g.addColorStop(1, '#f39c12');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.roundRect(BL, BY + 10, BW * progress, BH - 20, 4); ctx.fill();
    // Shine stripe along top of fill
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath(); ctx.roundRect(BL, BY + 10, BW * progress, (BH - 20) * 0.45, [4,4,0,0]); ctx.fill();
  }

  // Dad dot on the fill edge
  const dotX = BL + BW * progress;
  ctx.shadowBlur = 8; ctx.shadowColor = '#ffd700';
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(dotX, BY + BH/2, 5, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Score label centred in the strip
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(`Score: ${score}`, W / 2, BY + 1);

  drawHouseIcon(BL / 2, BY + BH / 2 + 2);
  drawYMCAIcon(W - BR / 2, BY + BH / 2 + 2);
}

// ── Update background scrolling ───────────────────────────────────────────────
function updateBackground() {
  scrollBg += effectiveSpeed();
  for (const c of clouds) {
    c.x -= c.spd;
    if (c.x + c.w * 2 < 0) { c.x = W + 20; c.y = 20 + Math.random() * 70; }
  }
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetGame() {
  score          = 0;
  gameSpeed      = 4;
  scrollBg       = 0;
  frame          = 0;
  gameStats      = { waspsStung: 0, hosedCount: 0, obstacleHits: 0 };
  coinsCollected = new Set();
  coinsSpawned   = new Set();
  pendingCoin    = null;
  powerups       = [];
  obstacles      = [];
  puTimer        = 260;
  obsTimer       = 80;
  ymcaTriggered  = false;
  floatTexts     = [];
  dad.y          = GROUND_Y - dad.h;
  dad.vy         = 0;
  dad.onGround   = true;
  dad.jumpsLeft  = 1;
  dad.coffeeTimer = dad.remoteTimer = dad.tongsTimer = 0;
  dad.invTimer    = dad.hosedTimer  = dad.stungTimer = dad.sprayTimer = 0;
  hunger      = MAX_HUNGER;
  hungerTimer = 0;
  eggTimer    = 420;
  gameState      = GS.PLAYING;
}

// ── Menu screen ───────────────────────────────────────────────────────────────
function drawMenu() {
  // Semi-transparent panel
  ctx.fillStyle = 'rgba(10,20,40,0.78)';
  ctx.beginPath(); ctx.roundRect(W/2 - 210, 60, 420, 280, 16); ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,0,0.6)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(W/2 - 210, 60, 420, 280, 16); ctx.stroke();

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // Title
  ctx.font = 'bold 46px "Comic Sans MS", cursive';
  ctx.fillStyle = '#ffd700';
  ctx.shadowBlur = 18; ctx.shadowColor = '#f39c12';
  ctx.fillText('DAD RUNNER', W/2, 112);
  ctx.shadowBlur = 0;

  ctx.font = '16px "Comic Sans MS", cursive';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText("Father's Day Edition 🎉", W/2, 144);

  // Hints
  const hints = [
    ['☕', 'Coffee — double jump'],
    ['🐝', 'Bug Spray — wasp shield'],
    ['🍳', 'Boiled Egg — restores hunger'],
    ['💰', 'Find £  €  ¥ for your collection'],
  ];
  ctx.font = '14px "Comic Sans MS", cursive';
  hints.forEach(([icon, text], i) => {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.textAlign = 'right';
    ctx.fillText(icon, W/2 - 10, 186 + i * 26);
    ctx.textAlign = 'left';
    ctx.fillText(text, W/2 - 2, 186 + i * 26);
  });

  // Blinking start prompt
  if (Math.floor(frame / 28) % 2 === 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 17px "Comic Sans MS", cursive';
    ctx.textAlign = 'center';
    ctx.fillText('PRESS SPACE OR TAP TO START', W/2, 316);
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (gameState === GS.MENU || gameState === GS.TRANSITION) { resetGame(); return; }
    doJump();
  }
});
canvas.addEventListener('pointerdown', () => {
  if (gameState === GS.MENU || gameState === GS.TRANSITION) { resetGame(); return; }
  doJump();
});

// ── Win / stats screen ────────────────────────────────────────────────────────
function drawTransition() {
  ctx.fillStyle = 'rgba(0,0,0,0.90)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 34px "Comic Sans MS", cursive';
  ctx.fillText('🏋️  YOU MADE IT TO THE YMCA!  🏋️', W/2, 54);

  ctx.font = '17px "Comic Sans MS", cursive';
  let ly = 108;
  const line = (txt, col) => { ctx.fillStyle = col || 'white'; ctx.fillText(txt, W/2, ly); ly += 32; };

  const ws = gameStats.waspsStung;
  const hc = gameStats.hosedCount;
  const oh = gameStats.obstacleHits;
  line(`🐝 Stung by ${ws} wasp${ws !== 1 ? 's' : ''}`,                        '#e74c3c');
  line(`🌀 Tangled in the garden hose ${hc} time${hc !== 1 ? 's' : ''}`,      '#3498db');
  line(`🧱 Walked into something ${oh} time${oh !== 1 ? 's' : ''}`,           '#e67e22');

  const cc = coinsCollected.size;
  const pct = Math.round(cc / 3 * 100);
  ly += 4;
  const coinStr = COIN_TYPES.map(t => coinsCollected.has(t) ? (t==='pound'?'£':t==='euro'?'€':'¥') : '○').join('  ');
  line(`💰 Coins: ${coinStr}  (${cc}/3 — ${pct}%)`, '#ffd700');

  const penalty = ws * 15 + hc * 5 + oh * 10;
  const bonus   = cc * 50;
  const final   = Math.max(0, score + bonus - penalty);
  ly += 4;
  ctx.fillStyle = '#2ecc71';
  ctx.font = 'bold 22px "Comic Sans MS", cursive';
  ctx.fillText(`Final score: ${final}`, W/2, ly);

  if (hiScore > 0) {
    ly += 30;
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = '14px "Comic Sans MS", cursive';
    ctx.fillText(`Best: ${hiScore}`, W/2, ly);
  }

  ly += 44;
  if (Math.floor(frame / 28) % 2 === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = '15px "Comic Sans MS", cursive';
    ctx.fillText('Press SPACE or tap to play again', W/2, ly);
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H);

  if (gameState === GS.MENU) {
    drawBackground();
    updateBackground();
    drawMenu();
    frame++;
    requestAnimationFrame(loop);
    return;
  }

  if (gameState === GS.TRANSITION) {
    drawBackground();
    updateBackground();
    drawTransition();
    frame++;
    requestAnimationFrame(loop);
    return;
  }

  drawBackground();
  updateBackground();
  updateScore();
  updateHunger();
  updateObstacles();
  updatePowerups();
  checkObstacleCollisions();
  checkPowerupCollisions();
  updateFloatTexts();
  for (const o of obstacles) drawObstacle(o);
  for (const p of powerups)  drawPowerup(p);
  updateDad();
  drawDad();
  drawFloatTexts();
  drawProgressBar();
  drawCoinTracker();
  drawHungerBar();

  frame++;
  requestAnimationFrame(loop);
}

loop();
</script>
